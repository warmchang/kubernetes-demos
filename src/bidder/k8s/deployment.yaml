apiVersion: apps/v1
kind: Deployment
metadata:
  name: bidder-service
  labels:
    app: bidder-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bidder-service
  template:
    metadata:
      labels:
        app: bidder-service
        version: v2.4.0
    spec:
      containers:
        - name: bidder
          image: robusta/bidder-service:v2.4.0
          ports:
            - containerPort: 8080
          env:
            - name: VERSION
              value: "2.4.0"
            - name: CACHE_TTL
              value: "5m"
            - name: MAX_BID_CENTS
              value: "500"
            - name: BID_TIMEOUT
              value: "100ms"
            - name: LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
